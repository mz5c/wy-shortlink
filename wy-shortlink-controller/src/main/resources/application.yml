server:
  port: 8080

spring:
  application:
    name: wy-shortlink
  profiles:
    active: dev

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.wy.shortlink.dao.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

shortlink:
  domain: http://localhost:8080

jwt:
  secret: changeme-in-production-use-env-var-min-256-bits
  access-token-expiration: 30
  refresh-token-expiration: 10080
